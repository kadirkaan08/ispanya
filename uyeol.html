	  <script>
var sifre1 = document.getElementById("sifre1");
var sifre2 = document.getElementById("sifre2");
var uyari = document.getElementById("uyari");
var form = document.getElementById("formum");

function kontrolEt() {
    if (sifre1.value !== sifre2.value) {
        uyari.style.display = "block";
        return false;
    } else {
        uyari.style.display = "none";
        return true;
    }
}

// Yazarken kontrol
sifre1.addEventListener("input", kontrolEt);
sifre2.addEventListener("input", kontrolEt);

// Form gönderirken kontrol
form.addEventListener("submit", function(e){
    if (!kontrolEt()) {
        e.preventDefault();
    }
});
</script>
